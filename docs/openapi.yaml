openapi: 3.0.3
info:
  title: CNDQ Marketplace API
  description: |
    API for the CNDQ (Chemical Name-Drop Quote) marketplace game.
    Players trade chemicals (C, N, D, Q), negotiate deals, and compete for the best returns.

    ## Authentication
    All endpoints (except session status) require authentication via session cookies.

    ## Game Flow
    1. **TRADING** phase - Players can create offers, negotiate, and trade
    2. **PRODUCTION** phase - Production runs, market is locked
    3. Sessions advance automatically or manually

  version: 1.1.0
  contact:
    name: CNDQ API Support

servers:
  - url: /api
    description: API endpoints

tags:
  - name: Session
    description: Game session and phase management
  - name: Team
    description: Team profile, settings, and inventory
  - name: Marketplace
    description: Public marketplace offers and buy orders
  - name: Offers
    description: Create and manage sell offers and buy bids
  - name: Trades
    description: Trade execution history
  - name: Listings
    description: Interest advertisements (buy/sell intent without price)
  - name: Negotiations
    description: Private negotiations between teams
  - name: Notifications
    description: Team notifications
  - name: Production
    description: Production results and shadow prices
  - name: Reports
    description: Financial summaries and LP optimization reports
  - name: Leaderboard
    description: Team standings
  - name: Admin
    description: Administrative endpoints (admin only)

components:
  schemas:
    Chemical:
      type: string
      enum: [C, N, D, Q]
      description: Chemical type (C, N, D, or Q)

    TradeType:
      type: string
      enum: [buy, sell]
      description: Trade direction

    GamePhase:
      type: string
      enum: [TRADING, PRODUCTION, STOPPED]
      description: Current game phase

    StalenessLevel:
      type: string
      enum: [fresh, warning, stale]
      description: How stale shadow price calculations are relative to recent trades

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    Offer:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
          format: email
        sellerName:
          type: string
        chemical:
          $ref: '#/components/schemas/Chemical'
        quantity:
          type: integer
          minimum: 1
        minPrice:
          type: number
          format: float
          minimum: 0
        type:
          type: string
          enum: [sell]
        timestamp:
          type: integer

    BuyOrder:
      type: object
      properties:
        id:
          type: string
        buyerId:
          type: string
          format: email
        buyerName:
          type: string
        chemical:
          $ref: '#/components/schemas/Chemical'
        quantity:
          type: integer
          minimum: 1
        maxPrice:
          type: number
          format: float
          minimum: 0
        type:
          type: string
          enum: [buy]
        timestamp:
          type: integer

    Negotiation:
      type: object
      properties:
        id:
          type: string
        initiatorId:
          type: string
          format: email
        initiatorName:
          type: string
        responderId:
          type: string
          format: email
        responderName:
          type: string
        chemical:
          $ref: '#/components/schemas/Chemical'
        status:
          type: string
          enum: [pending, accepted, rejected, countered, cancelled]
        currentOffer:
          type: object
          properties:
            quantity:
              type: integer
            price:
              type: number
        history:
          type: array
          items:
            type: object
        session:
          type: integer
        type:
          $ref: '#/components/schemas/TradeType'

    Listing:
      type: object
      description: A public interest advertisement (buy or sell intent, no price)
      properties:
        id:
          type: string
        teamId:
          type: string
          format: email
        teamName:
          type: string
        chemical:
          $ref: '#/components/schemas/Chemical'
        type:
          $ref: '#/components/schemas/TradeType'
        message:
          type: string
        timestamp:
          type: integer
        session:
          type: integer

    Transaction:
      type: object
      properties:
        transactionId:
          type: string
        chemical:
          $ref: '#/components/schemas/Chemical'
        quantity:
          type: integer
        pricePerGallon:
          type: number
        totalAmount:
          type: number
        sellerName:
          type: string
        buyerName:
          type: string
        timestamp:
          type: integer
        heat:
          type: number
          nullable: true

    ShadowPrices:
      type: object
      properties:
        C:
          type: number
        N:
          type: number
        D:
          type: number
        Q:
          type: number

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

security:
  - cookieAuth: []

paths:

  # ─── Session ────────────────────────────────────────────────────────────────

  /session/status:
    get:
      tags: [Session]
      summary: Get current session status
      description: Returns current session number, phase, and time remaining. Public endpoint.
      security: []
      responses:
        '200':
          description: Session status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  session:
                    type: integer
                  phase:
                    $ref: '#/components/schemas/GamePhase'
                  timeRemaining:
                    type: integer
                    description: Seconds remaining in current phase
                  autoAdvance:
                    type: boolean
                  productionJustRan:
                    type: boolean
                    nullable: true
                  gameStopped:
                    type: boolean
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Session]
      summary: Acknowledge production results
      description: Clear the productionJustRan flag
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                acknowledgeProduction:
                  type: boolean
      responses:
        '200':
          description: Production acknowledged

  /session/restart:
    post:
      tags: [Session]
      summary: Restart the game
      description: |
        Restarts the game with existing NPC count.
        Non-admins can only restart when autoAdvance (24/7 mode) is enabled AND the game has finished.
        Admins can restart at any time.
      responses:
        '200':
          description: Game restarted and started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  session:
                    type: object
        '403':
          description: Restart not allowed (game in progress or autoAdvance disabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed
        '500':
          description: Server error

  # ─── Team ───────────────────────────────────────────────────────────────────

  /team/profile:
    get:
      tags: [Team]
      summary: Get team profile and inventory
      description: Returns full profile including funds, inventory quantities, and shadow price staleness indicator
      responses:
        '200':
          description: Team profile and inventory
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  profile:
                    type: object
                    properties:
                      email:
                        type: string
                        format: email
                      teamName:
                        type: string
                      currentFunds:
                        type: number
                      startingFunds:
                        type: number
                      initialProductionPotential:
                        type: number
                      settings:
                        type: object
                  inventory:
                    type: object
                    properties:
                      C:
                        type: number
                      N:
                        type: number
                      D:
                        type: number
                      Q:
                        type: number
                      transactionsSinceLastShadowCalc:
                        type: integer
                      stalenessLevel:
                        $ref: '#/components/schemas/StalenessLevel'
        '401':
          description: Not authenticated
        '500':
          description: Server error

    post:
      tags: [Team]
      summary: Update team profile
      description: Update limited profile fields (currently only teamName)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teamName:
                  type: string
      responses:
        '200':
          description: Profile updated
        '401':
          description: Not authenticated
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /team/settings:
    get:
      tags: [Team]
      summary: Get team settings
      responses:
        '200':
          description: Team settings
        '401':
          description: Not authenticated
        '500':
          description: Server error

    post:
      tags: [Team]
      summary: Update team settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teamName:
                  type: string
      responses:
        '200':
          description: Settings updated
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '405':
          description: Method not allowed
        '500':
          description: Server error

  # ─── Marketplace ────────────────────────────────────────────────────────────

  /marketplace/offers:
    get:
      tags: [Marketplace]
      summary: Get all marketplace offers
      description: Returns all active sell offers and buy orders, optionally filtered by chemical. Results are cached for 3 seconds.
      parameters:
        - name: chemical
          in: query
          description: Filter by chemical(s), comma-separated (e.g., "C" or "C,N,D")
          schema:
            type: string
      responses:
        '200':
          description: Marketplace offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  offersByChemical:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/Offer'
                  buyOrdersByChemical:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/BuyOrder'
                  summary:
                    type: object
                    description: Market summary statistics
                  timestamp:
                    type: integer
        '401':
          description: Not authenticated
        '500':
          description: Server error

  # ─── Offers ─────────────────────────────────────────────────────────────────

  /offers/create:
    post:
      tags: [Offers]
      summary: Create a new sell offer
      description: Create a new sell offer for a chemical you have in inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chemical, quantity, minPrice]
              properties:
                chemical:
                  $ref: '#/components/schemas/Chemical'
                quantity:
                  type: integer
                  minimum: 1
                minPrice:
                  type: number
                  format: float
                  minimum: 0
      responses:
        '200':
          description: Offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  offer:
                    $ref: '#/components/schemas/Offer'
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Trading not allowed (wrong phase)
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /offers/cancel:
    post:
      tags: [Offers]
      summary: Cancel a sell offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [offerId]
              properties:
                offerId:
                  type: string
      responses:
        '200':
          description: Offer cancelled
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Not authorized to cancel this offer
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /offers/bid:
    post:
      tags: [Offers]
      summary: Create a buy order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chemical, quantity, maxPrice]
              properties:
                chemical:
                  $ref: '#/components/schemas/Chemical'
                quantity:
                  type: integer
                  minimum: 1
                maxPrice:
                  type: number
                  format: float
                  minimum: 0
      responses:
        '200':
          description: Buy order created
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Trading not allowed
        '405':
          description: Method not allowed
        '500':
          description: Server error

  # ─── Trades ─────────────────────────────────────────────────────────────────

  /trades/history:
    get:
      tags: [Trades]
      summary: Get team trade history
      description: Returns all completed transactions for the current team
      responses:
        '200':
          description: Trade history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transactions:
                    type: array
                    items:
                      type: object
                  debug:
                    type: object
                    properties:
                      teamEmail:
                        type: string
                      teamName:
                        type: string
                      transactionCount:
                        type: integer
        '401':
          description: Not authenticated
        '500':
          description: Server error

  /trades/global:
    get:
      tags: [Trades]
      summary: Get all marketplace transactions
      description: Returns all completed trades across all teams (public trade tape)
      parameters:
        - name: limit
          in: query
          description: Maximum number of results (default 50, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Global trade history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  count:
                    type: integer
        '500':
          description: Server error

  # ─── Listings ───────────────────────────────────────────────────────────────

  /listings/list:
    get:
      tags: [Listings]
      summary: Get all active listings
      description: Returns all active interest advertisements grouped by chemical. Price and quantity are hidden from non-owners.
      responses:
        '200':
          description: Active listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Listing'
        '401':
          description: Not authenticated
        '500':
          description: Server error

  /listings/post:
    post:
      tags: [Listings]
      summary: Post a listing
      description: Create a buy or sell interest advertisement (no price — intent only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chemical, type]
              properties:
                chemical:
                  $ref: '#/components/schemas/Chemical'
                type:
                  $ref: '#/components/schemas/TradeType'
      responses:
        '200':
          description: Listing posted
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Trading not allowed
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /listings/my-listings:
    get:
      tags: [Listings]
      summary: Get my listings
      description: Returns all listings posted by the current team
      responses:
        '200':
          description: Your listings
        '401':
          description: Not authenticated
        '500':
          description: Server error

  /listings/cancel:
    post:
      tags: [Listings]
      summary: Cancel a listing
      description: Cancel one of your own listings. Also removes the corresponding buy order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId]
              properties:
                listingId:
                  type: string
      responses:
        '200':
          description: Listing cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  listingId:
                    type: string
                  chemical:
                    $ref: '#/components/schemas/Chemical'
        '400':
          description: Missing listingId
        '401':
          description: Not authenticated
        '403':
          description: Can only cancel your own listings
        '405':
          description: Method not allowed
        '500':
          description: Server error

  # ─── Negotiations ───────────────────────────────────────────────────────────

  /negotiations/initiate:
    post:
      tags: [Negotiations]
      summary: Initiate a negotiation
      description: Start a private negotiation with another team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [responderId, chemical, quantity, price]
              properties:
                responderId:
                  type: string
                  format: email
                adId:
                  type: string
                  description: Optional listing ID this negotiation responds to
                chemical:
                  $ref: '#/components/schemas/Chemical'
                quantity:
                  type: integer
                  minimum: 1
                price:
                  type: number
                  format: float
                  minimum: 0
                type:
                  $ref: '#/components/schemas/TradeType'
      responses:
        '200':
          description: Negotiation initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  negotiation:
                    $ref: '#/components/schemas/Negotiation'
        '400':
          description: Invalid request (cannot negotiate with self, missing fields)
        '401':
          description: Not authenticated
        '403':
          description: Trading not allowed
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /negotiations/list:
    get:
      tags: [Negotiations]
      summary: List negotiations
      description: Get all negotiations involving the current team
      responses:
        '200':
          description: List of negotiations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  negotiations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Negotiation'
        '401':
          description: Not authenticated
        '500':
          description: Server error

  /negotiations/accept:
    post:
      tags: [Negotiations]
      summary: Accept a negotiation
      description: Accept the current offer. Executes the trade immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [negotiationId]
              properties:
                negotiationId:
                  type: string
      responses:
        '200':
          description: Negotiation accepted and trade executed
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Not authorized or trading not allowed
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /negotiations/counter:
    post:
      tags: [Negotiations]
      summary: Counter a negotiation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [negotiationId, quantity, price]
              properties:
                negotiationId:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                price:
                  type: number
                  format: float
                  minimum: 0
      responses:
        '200':
          description: Counter-offer made
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Not authorized or trading not allowed
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /negotiations/reject:
    post:
      tags: [Negotiations]
      summary: Reject a negotiation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [negotiationId]
              properties:
                negotiationId:
                  type: string
      responses:
        '200':
          description: Negotiation rejected
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '403':
          description: Not authorized
        '405':
          description: Method not allowed
        '500':
          description: Server error

  /negotiations/react:
    post:
      tags: [Negotiations]
      summary: React to a negotiation
      description: Send an emoji reaction to a negotiation message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [negotiationId, emoji]
              properties:
                negotiationId:
                  type: string
                emoji:
                  type: string
      responses:
        '200':
          description: Reaction added
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
        '405':
          description: Method not allowed
        '500':
          description: Server error

  # ─── Notifications ──────────────────────────────────────────────────────────

  /notifications/list:
    get:
      tags: [Notifications]
      summary: List notifications
      description: Get all notifications for the current team
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notifications:
                    type: array
                    items:
                      type: object
        '401':
          description: Not authenticated
        '500':
          description: Server error

    post:
      tags: [Notifications]
      summary: Mark notifications as read
      responses:
        '200':
          description: Notifications marked read
        '401':
          description: Not authenticated
        '500':
          description: Server error

  # ─── Production ─────────────────────────────────────────────────────────────

  /production/results:
    get:
      tags: [Production]
      summary: Get production results
      description: |
        Returns production results for the current team.
        Security: rejects `team`, `email`, and `user` query parameters.
      parameters:
        - name: session
          in: query
          description: Session number (defaults to most recent)
          schema:
            type: integer
      responses:
        '200':
          description: Production results
        '401':
          description: Not authenticated
        '403':
          description: Cross-team query rejected
        '500':
          description: Server error

  /production/shadow-prices:
    get:
      tags: [Production]
      summary: Calculate shadow prices
      description: |
        Recalculates and returns shadow prices for the current team's inventory.
        Security: rejects `team`, `email`, and `user` query parameters.
        Use `/production/shadow-prices-read` for polling — this endpoint is expensive.
      responses:
        '200':
          description: Shadow prices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  shadowPrices:
                    $ref: '#/components/schemas/ShadowPrices'
        '401':
          description: Not authenticated
        '403':
          description: Cross-team query rejected
        '500':
          description: Server error

  /production/shadow-prices-read:
    get:
      tags: [Production]
      summary: Read cached shadow prices
      description: |
        Returns stored shadow prices WITHOUT recalculating (fast, safe to poll).
        Also returns staleness indicator.
        Security: rejects `team`, `email`, and `user` query parameters.
      responses:
        '200':
          description: Cached shadow prices with staleness
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  shadowPrices:
                    $ref: '#/components/schemas/ShadowPrices'
                  staleness:
                    type: object
                    properties:
                      count:
                        type: integer
                      level:
                        $ref: '#/components/schemas/StalenessLevel'
                  inventory:
                    type: object
                    properties:
                      C:
                        type: number
                      N:
                        type: number
                      D:
                        type: number
                      Q:
                        type: number
                  note:
                    type: string
        '401':
          description: Not authenticated
        '403':
          description: Cross-team query rejected
        '500':
          description: Server error

  # ─── Reports ────────────────────────────────────────────────────────────────

  /reports/index:
    get:
      tags: [Reports]
      summary: Get financial and optimization reports
      description: |
        Generates financial summaries and LP optimization reports.
        Supports `type` query parameter to select report sections.
      parameters:
        - name: type
          in: query
          description: Report type
          schema:
            type: string
            enum: [all, financials, transactions, optimization]
            default: all
      responses:
        '200':
          description: Report data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  financials:
                    type: object
                    description: Present when type=all or type=financials
                  transactions:
                    type: array
                    description: Present when type=all or type=transactions
                    items:
                      type: object
                  optimization:
                    type: object
                    description: Present when type=all or type=optimization (LP solver answer + sensitivity)
        '401':
          description: Not authenticated
        '500':
          description: Server error

  # ─── Leaderboard ────────────────────────────────────────────────────────────

  /leaderboard/standings:
    get:
      tags: [Leaderboard]
      summary: Get team standings
      description: Returns current leaderboard ranked by ROI percentage
      responses:
        '200':
          description: Team standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  standings:
                    type: array
                    items:
                      type: object
                      properties:
                        teamName:
                          type: string
                        teamId:
                          type: string
